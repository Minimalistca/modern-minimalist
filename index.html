<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HXZEJH111N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HXZEJH111N');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Modern Minimalist</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo2.png">

    <style>
        :root { --terracotta: #C36B4D; --dark: #1A1A1A; --grey: #F8F8F8; }
        body { height: 100vh; margin: 0; font-family: 'Inter', sans-serif; background: var(--grey); color: var(--dark); display: flex; align-items: center; justify-content: center; text-align: center; }
        .container { padding: 20px; max-width: 500px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--terracotta); font-weight: 700; margin-bottom: 20px; display: block; text-decoration: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin: 10px 0; font-weight: 700; line-height: 1.2; }
        h1 span { font-style: italic; color: var(--terracotta); }
        p { color: #666; font-size: 1rem; margin-bottom: 30px; }

        /* Custom Form Styling */
        #notify-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 350px; margin: 0 auto; }
        input[type="email"] { padding: 15px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; }
        input[type="email"]:focus { border-color: var(--terracotta); }
        .btn { background: var(--dark); color: white; padding: 15px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--terracotta); }

        /* Success State */
        #success-state { display: none; opacity: 0; transform: translateY(10px); transition: all 0.6s ease; }
        .success-icon { font-size: 3rem; color: var(--terracotta); margin-bottom: 15px; }
        .footer { margin-top: 50px; font-size: 0.7rem; letter-spacing: 2px; color: #aaa; text-transform: uppercase; }
        
        /* Hidden fields for bot protection */
        .hidden-field { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <span class="logo-text">Modern Minimalist</span>

        <div id="form-state">
            <h1>Something <span>Analytical</span> is coming.</h1>
            <p>Expertly auditing the essentials for the modern Mississauga home. Join the waitlist for the launch.</p>
            
            <form id="notify-form" method="POST" action="https://938c01b0.sibforms.com/serve/MUIFAHCpEmoqPLfd6vAcS1g0siQu5x457FUACf-umcwt_Laemf_DuFQwrMH_2L5c77R4gO6hDzBumvXxUTgEuIsqIRg06G8bf_HdkeCyjg3GtlHS8eWU-7f5mNYmFzTTqy7j-AwmvTfm17rJdqVm563rvYugOyZI-WQIvEfipEg6V5UyzLWnHth4SPy06lIhERZvzdU69oGrqB_glQ==" target="hidden_iframe">
                <input type="email" name="EMAIL" placeholder="Enter your email address" required>
                
                <input type="text" name="email_address_check" value="" class="hidden-field">
                <input type="hidden" name="locale" value="en">
                
                <button type="submit" class="btn" id="submit-btn">Notify Me</button>
            </form>
        </div>

        <div id="success-state">
            <div class="success-icon">✓</div>
            <h1>Audit <span>Confirmed.</span></h1>
            <p>Your data-driven briefing is being prepared. <br> We'll notify you in Summer 2026.</p>
        </div>

        <div class="footer">Mississauga • Ontario</div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

    <script>
        var submitted = false;
        const formState = document.getElementById('form-state');
        const successState = document.getElementById('success-state');
        const form = document.getElementById('notify-form');

        form.onsubmit = function() {
            submitted = true;
            // Immediate visual feedback
            document.getElementById('submit-btn').innerText = "Sending...";
            document.getElementById('submit-btn').disabled = true;
        };

        function showSuccess() {
            formState.style.opacity = '0';
            setTimeout(() => {
                formState.style.display = 'none';
                successState.style.display = 'block';
                setTimeout(() => {
                    successState.style.opacity = '1';
                    successState.style.transform = 'translateY(0)';
                }, 50);
            }, 400);
        }
    </script>

</body>
</html>
